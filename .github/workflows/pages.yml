name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A014D5: ${{ secrets.A014D5 }}
          B8CD23: ${{ secrets.B8CD23 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A014D5', '')
          bm = os.environ.get('B8CD23', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 28a440e482680f1fa39c8deffc9fd7 -->', gm)
              s2 = s2.replace('<!-- 4671f3a05b0bfe18bfe78abfeec7c732a7733eb2bb33ad0d -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
